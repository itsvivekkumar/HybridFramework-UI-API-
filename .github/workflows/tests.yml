name: Hybrid Framework

on:
  push:
    branches: [ "main", "master" ]
  # pull_request:
  #   branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 22 (using the latest distribution)
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'oracle' 
          cache: 'maven'

      # 3. Run the tests using Maven
      - name: Run UI and API Tests
        run: mvn test

      # 4. Upload Test Reports (so you can view them even without email)
      - name: Upload Reports
        if: always()                       
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/       # Default Maven report path
